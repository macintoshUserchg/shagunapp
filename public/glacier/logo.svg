<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <defs>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
  </defs>
  
  <!-- Mountain/Ice graphic -->
  <g transform="translate(15, 15)">
    <polygon points="5,45 25,15 45,45" fill="url(#mountainGrad)"/>
    <polygon points="20,25 35,45 50,25 40,15 30,25 25,15" fill="white" opacity="0.9"/>
    <polygon points="35,45 45,25 55,45" fill="url(#mountainGrad)" opacity="0.8"/>
    <!-- Snow cap -->
    <polygon points="25,15 20,25 30,25" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="85" y="38" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white" letter-spacing="2">GLACIER</text>
  <text x="85" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white" letter-spacing="4" opacity="0.9">ICE CREAM</text>
</svg>